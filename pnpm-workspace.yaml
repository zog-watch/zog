packages:
  - 'web'
  - 'backend'
  - 'proxy'
  - 'zog-cache'
  - 'zog-addon'
  - 'providers'
  - 'extension'
  - 'desktop'
  - 'docs'
  - 'userscript'

overrides:
  # Use the WebAssembly build of rollup to avoid native binary issues in restricted environments
  rollup: 'npm:@rollup/wasm-node'
  # Enforce a single React version across the monorepo
  react: '18.3.1'
  react-dom: '18.3.1'
  '@types/react': '18.3.26'
  '@types/react-dom': '18.3.7'
  # Security / compatibility overrides from the original projects
  get-func-name@<2.0.1: '>=2.0.1'
  postcss@<8.4.31: '>=8.4.31'
  '@babel/traverse@<7.23.2': '>=7.23.2'
  crypto-js@<4.2.0: '>=4.2.0'
